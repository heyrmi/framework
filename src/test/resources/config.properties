# ==================================================
# Test Automation Framework - Default Configuration
# ==================================================

# Browser Settings
browser=chrome
headless=true

# Web URLs
base.url=https://the-internet.herokuapp.com
api.base.url=https://httpbin.org

# Remote Grid (set to enable RemoteWebDriver)
# grid.url=http://localhost:4444

# Mobile Settings
mobile.platform=android
appium.server.url=http://127.0.0.1:4723
android.device.name=emulator-5554
android.app.path=src/test/resources/apps/android.wdio.native.app.v2.2.0.apk
android.app.package=com.wdiodemoapp
android.app.activity=com.wdiodemoapp.MainActivity
ios.device.name=iPhone 15
ios.platform.version=17.0
ios.app.path=src/test/resources/apps/ios-native-demo-app.app
appium.no.reset=false
appium.command.timeout=60

# Timeouts (seconds)
explicit.wait=15
fluent.wait=30
polling.time=500
page.load.timeout=30

# API Settings
api.timeout=10
api.sla.ms=5000

# Retry
retry.count=1

# Parallel Execution
parallel.count=10

# Screenshots
screenshot.on.failure=true

# Download directory (for file download tests)
download.dir=target/downloads
